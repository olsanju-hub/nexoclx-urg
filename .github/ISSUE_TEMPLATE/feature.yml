name: Mejora
description: Nueva funcionalidad o mejora de una existente.
title: "[Mejora]: "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: Necesidad
      description: Que problema resuelve o que flujo mejora.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Propuesta
      description: Como deberia funcionar de forma practica.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Alcance
      description: Que entra y que queda fuera.
  - type: textarea
    id: references
    attributes:
      label: Referencias
      description: Bibliografia, enlaces, capturas o modulos relacionados.
