name: Bug
description: Algo no funciona como deberia.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: Que falla y donde ocurre.
      placeholder: En el modulo de FA, al abrir...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducirlo
      placeholder: |
        1. Ir a...
        2. Pulsar...
        3. Ver error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Capturas, navegador, movil/escritorio, modulo afectado o enlace.
